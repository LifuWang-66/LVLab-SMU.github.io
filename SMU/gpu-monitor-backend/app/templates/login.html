<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ app_name }} Login</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/styles.css') }}" />
  </head>
  <body>
    <header class="page-header">
      <div>
        <p class="eyebrow">GPU Monitor</p>
        <h1>{{ app_name }}</h1>
      </div>
    </header>

    <main class="layout" style="grid-template-columns: 1fr; max-width: 760px; margin: 0 auto;">
      <section class="panel auth-panel">
        <h2>Login</h2>
        <p>Enter your Linux account to validate access and enter dashboard. You can optionally provide a new email to update the one on file.</p>
        <form id="access-form" method="post" action="/session/access">
          <label>
            Username
            <input name="username" required placeholder="e.g. jinyang" />
          </label>
          <label>
            Email (optional, update email on file)
            <input name="email" type="email" placeholder="you@smu.edu.sg" />
          </label>
          <label>
            Password
            <input name="password" type="password" placeholder="Leave empty if SSH key is already configured" />
          </label>
          <button type="submit">Validate and enter dashboard</button>
        </form>
      </section>
    </main>
  </body>
</html>
