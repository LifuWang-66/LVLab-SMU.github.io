<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ app_name }} Email</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/styles.css') }}" />
  </head>
  <body>
    <header class="page-header">
      <div>
        <p class="eyebrow">GPU Monitor</p>
        <h1>{{ app_name }}</h1>
      </div>
    </header>

    <main class="layout" style="grid-template-columns: 1fr; max-width: 760px; margin: 0 auto;">
      <section class="panel auth-panel">
        <h2>Email required</h2>
        <p>User <strong>{{ pending_username }}</strong> does not have an email in database. Please enter one to continue.</p>
        <form method="post" action="/session/email">
          <label>
            Email
            <input name="email" type="email" required placeholder="you@smu.edu.sg" />
          </label>
          <button type="submit">Save email and enter dashboard</button>
        </form>
      </section>
    </main>
  </body>
</html>
